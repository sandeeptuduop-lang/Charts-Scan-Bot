name: TradingView Analysis Bot

on:
  schedule:
    - cron: '0 */12 * * *'  # Runs at 00:00 and 12:00 UTC
  workflow_dispatch:

# This prevents multiple workflow runs from running concurrently
# If a run is in progress, new runs will wait in queue
concurrency:
  group: tradingview-bot
  cancel-in-progress: false  # Don't cancel running, just queue or skip

jobs:
  check-previous-run:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
    - name: Check if previous workflow is still running
      id: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get all workflow runs for this workflow that are in progress
        # Exclude the current run (which is just starting)
        CURRENT_RUN_ID="${{ github.run_id }}"
        
        IN_PROGRESS_RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=in_progress&per_page=100" \
          | jq -r --arg CURRENT "$CURRENT_RUN_ID" '.workflow_runs[] | select(.id != ($CURRENT | tonumber)) | .id')
        
        if [ -n "$IN_PROGRESS_RUNS" ]; then
          echo "⚠️ Previous workflow runs still in progress:"
          echo "$IN_PROGRESS_RUNS"
          echo "should_run=false" >> $GITHUB_OUTPUT
        else
          echo "✅ No previous runs in progress"
          echo "should_run=true" >> $GITHUB_OUTPUT
        fi

  run-bot:
    needs: check-previous-run
    if: needs.check-previous-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Setup SSH Keys
      run: |
        mkdir -p ~/.ssh

        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/repo1_key
        chmod 600 ~/.ssh/repo1_key

        echo "${{ secrets.SSH_PRIVATE_KEY_2 }}" > ~/.ssh/repo2_key
        chmod 600 ~/.ssh/repo2_key

        ssh-keyscan github.com >> ~/.ssh/known_hosts

        cat > ~/.ssh/config << EOF
        Host repo1
          HostName github.com
          User git
          IdentityFile ~/.ssh/repo1_key
          IdentitiesOnly yes

        Host repo2
          HostName github.com
          User git
          IdentityFile ~/.ssh/repo2_key
          IdentitiesOnly yes
        EOF

        chmod 600 ~/.ssh/config

    - name: Clone 5 Min Repository
      run: |
        git clone git@repo1:sandeeptuduop-lang/tradingview-analysis-bot.git private_repo_5min

    - name: Clone 30 Min Repository
      run: |
        git clone git@repo2:sandeeptuduop-lang/tradingview-analysis-bot-30min.git private_repo_30min

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Google Chrome
      run: |
        wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get update
        sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

    - name: Verify Chrome Installation
      run: |
        google-chrome --version

    - name: Install Tesseract OCR
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager gspread oauth2client pyotp opencv-python-headless pytesseract numpy

    - name: Run 5 Min Bot
      env:
        TV_EMAIL: ${{ secrets.TV_EMAIL }}
        TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        TV_2FA_SECRET: ${{ secrets.TV_2FA_SECRET }}
        GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      run: |
        cd private_repo_5min
        python main.py

    - name: Run 30 Min Bot
      env:
        TV_EMAIL: ${{ secrets.TV_EMAIL }}
        TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        TV_2FA_SECRET: ${{ secrets.TV_2FA_SECRET }}
        GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      run: |
        cd private_repo_30min
        python main.py

    - name: Upload 5 Min Debug Files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-5min-${{ github.run_id }}
        path: |
          private_repo_5min/debug_screenshots/*.png
          private_repo_5min/debug_screenshots/*.html
          private_repo_5min/debug_screenshots/*.txt
          private_repo_5min/screenshots_5min/*.png
        retention-days: 7

    - name: Upload 30 Min Debug Files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-30min-${{ github.run_id }}
        path: |
          private_repo_30min/debug_screenshots/*.png
          private_repo_30min/debug_screenshots/*.html
          private_repo_30min/debug_screenshots/*.txt
          private_repo_30min/screenshots_30min/*.png
        retention-days: 7

    - name: List Files
      if: always()
      run: |
        echo "===== 5 MIN ====="
        ls -la private_repo_5min/debug_screenshots/ || true
        ls -la private_repo_5min/screenshots_5min/ || true

        echo "===== 30 MIN ====="
        ls -la private_repo_30min/debug_screenshots/ || true
        ls -la private_repo_30min/screenshots_30min/ || true
